# digital-garden.conf
# Configuration Nginx pour servir le digital garden Astro (output statique).
# Conçu pour SWAG (linuxserver/swag) mais compatible Nginx standard.
#
# EMPLACEMENT SWAG : /config/nginx/proxy-confs/digital-garden.conf
# (ou /config/nginx/site-confs/ selon ta version de SWAG)
#
# À ADAPTER :
#   - Remplace "garden.ton-domaine.com" par ton sous-domaine
#   - Remplace "/opt/digital-garden/dist" par le chemin réel vers dist/

server {
    listen 80;
    listen [::]:80;
    server_name garden.ton-domaine.com;

    # Redirige tout le HTTP vers HTTPS (SWAG gère le certificat)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name garden.ton-domaine.com;

    # ── TLS — SWAG gère les certificats automatiquement ───────────────────────
    # Si tu utilises SWAG, ces chemins sont standards :
    ssl_certificate     /config/keys/letsencrypt/fullchain.pem;
    ssl_certificate_key /config/keys/letsencrypt/privkey.pem;

    # Paramètres TLS sécurisés (SWAG les inclut généralement via ssl.conf)
    include /config/nginx/ssl.conf;

    # ── Racine du site ─────────────────────────────────────────────────────────
    # À ADAPTER : chemin absolu vers le dossier dist/ du projet
    root /opt/digital-garden/dist;
    index index.html;

    # ── Charset & types MIME ───────────────────────────────────────────────────
    charset utf-8;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /config/log/nginx/digital-garden.access.log;
    error_log  /config/log/nginx/digital-garden.error.log warn;

    # ── Sécurité : headers HTTP ────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "same-origin"     always;
    # Ajuste la CSP selon tes besoins (Google Fonts, etc.)
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ── Routing : Astro génère des fichiers index.html dans des dossiers ───────
    # Ex : /notes/jardinage-numerique/ → dist/notes/jardinage-numerique/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ── Page 404 personnalisée ─────────────────────────────────────────────────
    # Astro génère une page 404 si tu crées src/pages/404.astro
    error_page 404 /404/index.html;
    location = /404/index.html {
        internal;
    }

    # ── Cache agressif pour les assets statiques (JS, CSS, images, fonts) ─────
    # Ces fichiers ont des noms hashés par Astro — ils peuvent être cachés longtemps.
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Répète les headers de sécurité (add_header ne s'hérite pas dans les blocs location)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Désactive l'accès aux fichiers cachés (.git, .env, etc.) ─────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Désactive le listing de répertoires ───────────────────────────────────
    autoindex off;

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;
}
