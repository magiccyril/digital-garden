services:
  digital-garden:
    build: .
    container_name: digital-garden
    restart: unless-stopped
    volumes:
      # Notes Obsidian synchronisées par Syncthing — lecture seule pour le builder
      - /data/syncthing/notes:/app/src/content/notes:ro
      # dist/ sur l'hôte : SWAG le sert directement depuis ce chemin
      - /opt/digital-garden/dist:/app/dist
      # (optionnel) persister les logs de build entre les redémarrages
      # - /opt/digital-garden/build.log:/app/build.log
    environment:
      - NODE_ENV=production
