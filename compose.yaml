services:
  digital-garden:
    build: .
    container_name: digital-garden
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      # Notes Obsidian — lecture seule pour le builder
      - ${NOTES_PATH}:/app/src/content/notes:ro
      # Chemin du build sur l'hôte
      - ${DIST_PATH}:/app/dist
      # (optionnel) persister les logs de build entre les redémarrages
      - ${LOG_PATH}:/app/logs
    environment:
      - NODE_ENV=production
